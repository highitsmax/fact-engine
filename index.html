<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannabis Factbook | Cannabis Wise Guys</title>
  <meta name="description" content="6,000+ cannabis policy facts pulled from government reports. Search by state, topic, or keyword.">
  <meta property="og:title" content="Cannabis Factbook">
  <meta property="og:description" content="Government cannabis data — searchable, cited, linked to original reports.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/cwg-logo.png">
  <link rel="icon" href="assets/cwg-crest.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
  <script src="app.js?v=7" defer></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <a href="https://cannabiswiseguys.com" target="_blank" rel="noopener" class="logo-link">
          <img src="assets/cwg-crest-white.png" alt="CWG" class="sidebar-logo sidebar-logo--dark">
          <img src="assets/cwg-crest-dark.png" alt="CWG" class="sidebar-logo sidebar-logo--light">
        </a>
        <div class="sidebar-brand">
          <span class="brand-name">CANNABIS<br>FACTBOOK</span>
        </div>
        <span class="beta-badge">BETA</span>
      </div>

      <div class="sidebar-search">
        <input type="text" id="search" placeholder="Search 6,000+ facts..." autocomplete="off" spellcheck="false">
      </div>

      <div class="sidebar-nav">
        <button class="nav-tab active" id="view-search" onclick="switchView('search')">Data</button>
        <button class="nav-tab" id="view-sources" onclick="switchView('sources')">Sources <span id="source-count" class="nav-count">--</span></button>
        <button class="nav-tab" id="view-states" onclick="switchView('states')">States</button>
      </div>

      <div class="sidebar-filters" id="sidebar-filters">
        <details class="filter-group" open>
          <summary class="filter-label">Jurisdiction</summary>
          <div id="filter-countries" class="filter-checks"></div>
          <div id="filter-states" class="filter-checks filter-checks--tall"></div>
        </details>
        <details class="filter-group" open>
          <summary class="filter-label">Topic</summary>
          <div id="filter-categories" class="filter-checks filter-checks--tall"></div>
        </details>
        <details class="filter-group">
          <summary class="filter-label">Year Range</summary>
          <div class="year-row">
            <input type="number" id="year-start" placeholder="From" min="2010" max="2030">
            <span class="year-dash">&ndash;</span>
            <input type="number" id="year-end" placeholder="To" min="2010" max="2030">
          </div>
        </details>
        <details class="filter-group">
          <summary class="filter-label">Value Type</summary>
          <div id="filter-valuetypes" class="filter-checks"></div>
        </details>
        <details class="filter-group">
          <summary class="filter-label">Data Type</summary>
          <div id="filter-types" class="filter-checks"></div>
        </details>
      </div>

      <button class="sidebar-clear" id="clear-filters" onclick="clearFilters()">Reset Filters</button>

      <div class="sidebar-foot">
        <div class="sidebar-stats">
          <span><strong id="stat-facts">--</strong> facts</span>
          <span><strong id="stat-reports">--</strong> reports</span>
          <span><strong id="stat-us-states">--</strong> states</span>
        </div>
        <div class="sidebar-links">
          <a href="https://cannabiswiseguys.com" target="_blank" rel="noopener">cannabiswiseguys.com</a>
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfAr0l1d53il4pEHlu4jAwLkUxKMjcnUEIP-QMptX56DLG4LQ/viewform" target="_blank" rel="noopener">Report an error</a>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-header" id="mobile-header">
        <button class="hamburger" id="mobile-menu" onclick="toggleSidebar()">
          <span></span><span></span><span></span>
        </button>
        <a href="https://cannabiswiseguys.com" target="_blank" rel="noopener" class="mobile-header-brand">
          <img src="assets/cwg-logo-white.png" alt="Cannabis Wise Guys" class="mh-logo mh-logo--dark">
          <img src="assets/cwg-logo-dark.png" alt="Cannabis Wise Guys" class="mh-logo mh-logo--light">
          <div class="mh-name">Cannabis Factbook</div>
        </a>
        <div class="mobile-header-tabs">
          <button class="ttab active" id="m-view-search" onclick="switchView('search')">Data</button>
          <button class="ttab" id="m-view-sources" onclick="switchView('sources')">Sources</button>
          <button class="ttab" id="m-view-states" onclick="switchView('states')">States</button>
          <span id="result-count-m" class="topbar-count"></span>
        </div>
      </div>
      <header class="topbar">
        <img src="assets/cwg-logo-white.png" alt="CWG" class="topbar-logo topbar-logo--dark">
        <img src="assets/cwg-logo-dark.png" alt="CWG" class="topbar-logo topbar-logo--light">
        <span class="topbar-title">Cannabis Factbook</span>
        <span id="result-count" class="topbar-count"></span>
      </header>

      <div class="content" id="content">
        <div class="col-head" id="table-head">
          <span class="ch">Year</span>
          <span class="ch">State</span>
          <span class="ch">Source</span>
          <span class="ch">Topic</span>
          <span class="ch">Description</span>
          <span class="ch">Value</span>
          <span class="ch"></span>
        </div>

        <section id="results" class="results">
          <div class="state-msg">Loading&hellip;</div>
        </section>

        <section id="sources-view" class="sources-view" style="display:none;">
          <div id="sources-list"></div>
        </section>

        <section id="states-view" style="display:none;">
          <div id="states-content"></div>
        </section>

        <nav id="pagination" class="pagination"></nav>

        <footer class="site-footer">
          <div class="footer-links">
            <a href="https://cannabiswiseguys.com/" target="_blank" rel="noopener">Home</a>
            <a href="https://cannabiswiseguys.com/about/" target="_blank" rel="noopener">About</a>
            <a href="https://cannabiswiseguys.com/insights/" target="_blank" rel="noopener">Insights</a>
            <a href="https://cannabiswiseguys.com/media-impact/" target="_blank" rel="noopener">Media & Impact</a>
            <a href="https://cannabiswiseguys.com/contact/" target="_blank" rel="noopener">Contact</a>
          </div>
          <div class="footer-copy">&copy; 2026 Cannabis Wise Guys</div>
        </footer>
      </div>
    </main>
  </div>
  <div class="overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
</body>
</html>
